# Mizuki 部署触发器
# 
# 当内容仓库更新时,通过 GitHub repository_dispatch 触发 Mizuki 仓库部署
# 
# 配置步骤:
# 1. 创建有 dreaifekks/Mizuki repo 权限的 GitHub token
# 2. 在本仓库添加 Secret:
#    Settings → Secrets → New repository secret
#    Name: DISPATCH_TOKEN
#    Value: GitHub token
# 3. 推送代码测试

name: Trigger Mizuki Deployment

on:
  push:
    branches:
      - master
    paths:
      # 只在内容文件变化时触发
      - 'posts/**'
      - 'spec/**'
      - 'data/**'
      - 'images/**'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: selfN100
    steps:
      - name: Trigger Mizuki deploy workflow
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "❌ DISPATCH_TOKEN secret is not set"
            exit 1
          fi

          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/dreaifekks/Mizuki/dispatches \
            -d '{"event_type":"content-updated"}')
          http_code=$(echo "$response" | tail -n1)
          
          if [ "$http_code" -eq 204 ]; then
            echo "✅ Mizuki deployment triggered successfully"
          else
            echo "❌ Failed to trigger deployment. HTTP code: $http_code"
            echo "$response" | sed '$d'
            exit 1
          fi
      
      - name: Job summary
        if: success()
        run: |
          echo "✅ Mizuki deployment triggered successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Message: ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "- Author: ${{ github.event.head_commit.author.name }}" >> $GITHUB_STEP_SUMMARY
